<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ETHZ Auto-Login</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1>ETHZ Auto-Login</h1>
      </header>

      <div id="status" class="status status-empty">No credentials set</div>

      <div class="field">
        <label for="username">Username</label>
        <input
          id="username"
          type="text"
          placeholder="ETH Username (e.g. nethz)"
          autocomplete="username"
        />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input
            id="password"
            type="password"
            placeholder="Password"
            autocomplete="current-password"
          />
          <button id="togglePassword" class="toggle" type="button" aria-label="Show password">
            👁
          </button>
        </div>
      </div>

      <div class="actions">
        <button id="saveBtn" class="btn primary" type="button">Save</button>
        <button id="deleteBtn" class="btn danger" type="button">Delete</button>
      </div>

      <footer class="footer">Credentials stored locally only</footer>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
