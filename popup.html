<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1" />
    <title>ETHZ Auto-Login</title>
    <link rel="stylesheet" href="popup.css" />
  </head>
  <body>
    <div class="container">
      <header class="header">
        <h1>ETHZ Auto-Login</h1>
      </header>

      <!-- Welcome banner (shown once on first install) -->
      <div id="welcome" class="welcome" style="display: none;">
        <p><strong>Welcome!</strong> Add your ETHZ credentials below to enable automatic login on all ETHZ websites.</p>
        <p class="welcome-sub">Your credentials are stored locally and never leave your browser. This extension is <a href="https://github.com/AlfredJustus/ethz-autologin" target="_blank" rel="noopener">open source</a>.</p>
      </div>

      <div id="status" class="status status-empty">No credentials set</div>

      <div class="field">
        <label for="username">Username</label>
        <input
          id="username"
          type="text"
          placeholder="ETH Username (e.g. nethz)"
          autocomplete="username"
        />
      </div>

      <div class="field">
        <label for="password">Password</label>
        <div class="password-wrapper">
          <input
            id="password"
            type="password"
            placeholder="Password"
            autocomplete="current-password"
          />
          <button id="togglePassword" class="toggle" type="button" aria-label="Show password">
            👁
          </button>
        </div>
      </div>

      <div class="actions">
        <button id="saveBtn" class="btn primary" type="button">Save</button>
        <button id="deleteBtn" class="btn danger" type="button">Delete</button>
      </div>

      <footer class="footer">
        Credentials stored locally only · <a href="https://github.com/AlfredJustus/ethz-autologin" target="_blank" rel="noopener">GitHub</a>
      </footer>
    </div>

    <script src="popup.js"></script>
  </body>
</html>
